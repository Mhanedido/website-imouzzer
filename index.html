<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>imouzzer</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        
        <!-- NAVBAR -->
        <header>
            <div class="logo">Travel</div>
            <div class="menu-btn" onclick="toggleMenu()">☰</div>
            <nav id="nav">
                <a href="#home">Home</a>
                <a href="#activities">Activities</a>
                <a href="#stays">Stay</a>
                <a href="#contact">Contact</a>
            </nav>
        </header>
        
        <!-- HERO SECTION -->
        <section id="home" class="hero">
            <video autoplay muted loop class="hero-video">
                <source src="hero-video.mp4" type="video/mp4">
            </video>
        
          <div class="hero-content">
            <h1>Explore Morocco</h1>
            <button>Book Stay</button>
            <button>Explore</button>
          </div>
        </section>
        
        <!-- ACTIVITIES -->
        <section id="activities">
          <h2>Activities</h2>
          <div class="grid" id="activitiesList"></div>
        </section>
        
        <!-- STAYS -->
        <section id="stays">
          <h2>Stays</h2>
          <div class="grid" id="staysList"></div>
        </section>
        
        <!-- CONTACT -->
        <footer id="contact">
          <p>Contact us: travel@email.com</p>
        </footer>
        
        <script src="script.js"></script>
    </body>
</html>
