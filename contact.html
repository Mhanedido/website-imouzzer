<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Cascade Trails</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="contact">
  <header class="site-header" data-header>
    <a class="brand" href="index.html" aria-label="Cascade Trails home">
      <span class="brand-mark">CT</span>
      <span>Cascade Trails</span>
    </a>
    <button class="menu-toggle" type="button" aria-label="Open menu" aria-expanded="false" data-menu-toggle>
      <span></span><span></span><span></span>
    </button>
    <nav class="main-nav" data-nav>
      <a href="index.html" data-page-link="home">Home</a>
      <a href="activities.html" data-page-link="activities">Activities</a>
      <a href="about.html" data-page-link="about">About</a>
      <a href="blog.html" data-page-link="blog">Blog</a>
      <a href="contact.html" data-page-link="contact">Contact</a>
    </nav>
  </header>

  <main class="page-main">
    <section class="page-hero">
      <div class="container">
        <p class="eyebrow">Contact</p>
        <h1>Tell us where you want the trail to begin.</h1>
      </div>
    </section>

    <section class="section contact">
      <div class="container contact-layout">
        <div>
          <p class="eyebrow">Book a tour</p>
          <h2>Ready for fresh air?</h2>
          <p>Send your date, group size, and adventure level. We will suggest a route that fits.</p>
        </div>
        <form class="booking-form">
          <label>Name<input type="text" name="name" placeholder="Your name"></label>
          <label>Email<input type="email" name="email" placeholder="you@example.com"></label>
          <label>Tour type
            <select name="tour">
              <option>Waterfall trekking</option>
              <option>Mountain hiking</option>
              <option>Forest sunrise</option>
              <option>River camping</option>
            </select>
          </label>
          <label>Message<textarea name="message" rows="4" placeholder="Date, people, and anything we should know"></textarea></label>
          <button class="btn primary" type="submit">Send request</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>Copyright 2026 Cascade Trails</span>
      <span>Nature tours / Waterfalls / Mountains</span>
    </div>
  </footer>
  <script src="script.js"></script>
</body>
</html>
